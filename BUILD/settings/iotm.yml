auto_mushroomGardenGrowth:
  type: integer
  description: Picks the mushroom when growth reaches the given value (or higher). Defaults to 1 to pick every day, capped at 11.
  tags:
    - mr2020
auto_skipGuzzlrCocktailSet:
  type: boolean
  description: If true will not accept and abandon a Platinum Guzzlr quest for the cocktail set.
  tags:
    - mr2020
auto_spoonsign:
  type: string
  description: What sign to change to with the hewn moon-rune spoon after finishing any business in the current sign. If blank or invalid, we won't switch automatically. Can be set to any of the 9 main sign names, or knoll/canadia/gnomad to automatically select the appropriate sign within that zone based on your mainstat. Also some shorthands are allowed in case you forgot which moonsign is which, such as famweight/clover/food/booze. You will be prompted to confirm that you actually do want to change signs automatically once per ascension (although it will automatically assume that you do after 15 seconds of inactivity), so forgetting to change the value in advance should not be a concern.
  tags:
    - mr2019
auto_hideAdultery:
  type: boolean
  description: When true, automatically deletes Zatara Consults from Kmails during end of day cleanup.
  tags:
    - mr2018
auto_optimizeConsultsInRun:
  type: boolean
  description: When true, optimize our consults in run to get Ascension relevant rewards.
  tags:
    - mr2018
auto_consultClan:
  type: string
  description: The clan name of the player you want to do Zatara consults with.
  tags:
    - mr2018
auto_consultChoice:
  type: string
  description: The name of the player you want to do Zatara consults with.
  tags:
    - mr2018
auto_ashtonLimit:
  type: integer
  description: If set, makes sure you save X of an item before feeding it to the Asdon Martin (ignores Soda Bread).
  tags:
    - mr2017
auto_floundryChoice:
  type: string
  description: Force floundry usage. Must use the item name (Use ; to separate by daycount, leave blank to skip a day).
  tags:
    - mr2016
auto_extrudeChoice:
  type: string
  description: ": separated by day, ; separated by order. Use food, booze. Defaults to booze for any empty fields."
  tags:
    - mr2016
auto_teaChoice:
  type: string
  description: When using the tea tree, grab this 'tea'. Must use a string that acceptable to Mafia's 'teatree' command (Use ; to separate by daycount, leave blank to skip a day).
  tags:
    - mr2015
