auto_interrupt:
  name: "Auto Interrupt"
  type: boolean
  description: Script will abort after the next action is finished (instead of mid turn which can cause problems). Will be reset to false after every time it is used.
auto_debugging:
  name: "Debugging Stop"
  type: boolean
  description: Every time you run the script it will perform one adventure and then stop by setting auto_interrupt = true
auto_paranoia:
  name: "Quest Paranoia"
  type: integer
  description: If quest tracking is broken enable this. It determines how often should we refresh quests. measured in adventures. -1 is never. 1 = every single adventure
auto_inv_paranoia:
  name: "Inventory Paranoia"
  type: boolean
  description: If item drop tracking is broken enable this. It will refresh inventory every loop.
auto_newbieOverride:
  name: "Newbie Override"
  type: boolean
  description: If true will override newbie block once then set itself to false. Newbie block is enabled used when you fight a crate (please report crate fighting) or when you spent too many adventures in a zone
auto_disableAdventureHandling:
  name: "Disable Pre & Post Adv Scripts"
  type: boolean
  description: When true this prevents preadventure and postadventure scripts from running. resets every loop.
auto_disableFamiliarChanging:
  name: "Disable Familiar Changing"
  type: boolean
  description: When true this prevents familiar changes. resets every loop.
auto_combatDirective:
  name: "Combat Directive"
  type: string
  description: An action to execute at the start of next combat. resets every loop.
auto_interruptZones:
  name: "Interrupt Zones"
  type: string
  description: Semicolon-separated list of zones to abort in before starting the first adventure.
