auto_delayTimer:
  type: integer
  description: Sets the delay before each action, default is 1 second(s). It is not recommended to reduce this below 1.
auto_powerLevelTimer:
  type: integer
  description: Delay in seconds before each time we spend an adv powerleveling. default is 10 sec. lowest valid value is 1.
auto_stayInRun:
  type: boolean
  description: If true, we stop when the King can be freed but do not free the King. Paths with a choice at liberation time will always stayInRun regardless of this setting.
auto_confidence:
  type: boolean
  description: If true, we'll get the confidence buff instead of breaking the mirror. Good if your combat suite isn't very fleshed out yet, since it makes the Naughty Sorceress dramatically easier.
auto_blacklistFamiliar:
  type: string
  description: A semi-colon separated string of familiar names that we do not want to use. They still may get used but this will minimize their usage.
auto_limitConsume:
  type: boolean
  description: When true will not eat or drink anything automatically.
auto_skipNightcap:
  type: boolean
  description: When true will not get overdrunk at the end of the day
auto_consumablePriceLimit:
  type: int
  description: Max price of consumables to eat (including pulls). Will still not go above mafia autobuy limit.
auto_consumeMinAdvPerFill:
  type: float
  description: The minimum adventures per fill to consider for a consumable before eating or drinking it. Defaults to 0.0 and will consume whatever is available if necessary.
auto_consumePullDesirability:
  type: float
  description: This value is used as a rough estimate of how much a pull is "worth" when the consumption algorithm is considering using pulls. Higher values will make it more conservative and vice-versa. Defaults to 5.0.
auto_dontConsumeKeyLimePies:
  type: boolean
  description: When false, will pull and eat key lime pies if we require keys. Does nothing if auto_limitConsume is true;
auto_dontConsumeLegendPizzas:
  type: boolean
  description: When false, will craft or pull and eat Cookbookbat Legend Pizzas. Does nothing if auto_limitConsume is true;
auto_bedtime_pulls_skip:
  type: boolean
  description: If true will not automatically pull any items at the end of day.
auto_bedtime_pulls_pvp_multi:
  type: float
  description: Set the value of X for the formula for pull of rollover equipment. desireability = 1*rollover adventures + X*rollover PVP fights (if hippy stone is unlocked).
auto_bedtime_pulls_min_desirability:
  type: float
  description: During bedtime we pull and wear equipment that gives extra adventures and optionally PVP fights on rollover. This variable determines the minimum allowed score improvement compared to current equipment before we consider pulling it.
auto_maximize_baseline:
  type: string
  description: The string to use as the baseline for the maximizer when deciding gear. If this is blank or "default", it will use a generated maximizer statement that takes your current situation in to account somewhat.
auto_equipment_override_hat:
  type: string
  description: A semicolon separated list of overrides for the hat slot.
auto_equipment_override_back:
  type: string
  description: A semicolon separated list of overrides for the back slot.
auto_equipment_override_shirt:
  type: string
  description: A semicolon separated list of overrides for the shirt slot.
auto_equipment_override_weapon:
  type: string
  description: A semicolon separated list of overrides for the weapon slot.
auto_equipment_override_off-hand:
  type: string
  description: A semicolon separated list of overrides for the off-hand slot.
auto_equipment_override_pants:
  type: string
  description: A semicolon separated list of overrides for the pants slot.
auto_equipment_override_acc:
  type: string
  description: A semicolon separated list of overrides for the acc slots.
auto_equipment_override_familiar:
  type: string
  description: A semicolon separated list of overrides for the familiar equipment slot.

auto_considerGalaktik:
  type: boolean
  description: When true autoscend may automatically enable galaktik quest for this run if it decides it is needed.
auto_slowSteelOrgan:
  type: boolean
  description: When true, don't immediately go for the Steel Organ (assuming we want a steel organ).
auto_skipUnlockGuild:
  type: boolean
  description: When true, don't unlock the guild.
auto_save_adv_override:
  type: integer
  description: Set an override to amount of adv to save at end of day. Set to -1 to handle this automatically.
auto_MLSafetyLimit:
  type: integer
  description: "If set this will be the (approximate) cap for +ML. WARNING: Certain conditions may require the script to exceed this by a small margin. For best results set this 10 below the maximum ML you can handle. Setting to -1 will cause the lowest possible ML to be equipped, including going negative if possible - this can cause non-optimal gear to be equipped."
auto_disregardInstantKarma:
  type: boolean
  description: "When true, the script will not scale back ML after reaching Level 13, if you also set auto_MLSafetyLimit to 999 the script will passively power level. WARNING: You are unlikely to get Instant Karma (This is useful if your run preceeds The Sea, The Basement, or Dungeons)"
auto_secondPlaceOrBust:
  type: boolean
  description: When true, abort before each tower test if we can't get to second place.
auto_log_level:
  type: int
  description: "valid choices: 0 = error. 1 = warning. 2 = info. 3 = debug. Sets the level of logging which autoscend will output to gCLI and session log. Defaults to 3 (debug)."
auto_log_level_restore:
  type: int
  description: "valid choices: 0 = no extra debugging. 1 = log the stages and their results 2 = log restorer data dump. Sets the level of extra debug logging which autoscend restore code will output to gCLI and session log. Defaults to 0. Note that this is just for extra debugging."
auto_restoreUseBloodBond:
  type: boolean
  description: Whether to use extra hp to cast blood bond. Blood bond has a recurring HP drain, set to false if you are worried about getting killed or wasting resources healing. Defaults to false.
auto_forceFatLootToken:
  type: boolean
  description: force grabbing the fat loot tokens from daily dungeon and fantasy realm every day even if you already have enough for this run. This is mainly for new accounts who want to get the cubeling and/or skillbooks.
auto_pvpEnable:
  type: boolean
  description: Break the hippy stone to unlock PvP? This may also let autoscend collect low-effort PVP items.
auto_towerBreak:
  type: string
  description: Where should we break in the tower? (e.g. wall of skin, wall of bones, shadow, ns). Blank by default.
auto_ignoreRestoreFailure:
  type: boolean
  description: if true we will always ignore failure to restore MP or HP and just continue playing
auto_workshed:
  type: string
  description: What workshed item should we initialize with? If blank or invalid, we will change workshed based on priorities. There are some shorthands or you can use the full name of the workshed item. Some worksheds are not implemented so unless you are certain you want to deviate, use auto.
auto_stopMinutesToRollover:
  type: int
  description: How many minutes before rollover do we need to start getting ready for bed?
