auto_maximize_baseline:
  name: "Maximizer Baseline"
  type: string
  description: The string to use as the baseline for the maximizer when deciding gear. If this is blank or "default", it will use a generated maximizer statement that takes your current situation in to account somewhat. Use "{default}" if you want that string to be injected into your provided statement, eg if you were trying to wear a certain item as much as possible "+10000 bonus iotm_name, {default}" to get the best of both worlds.
  tags: [equipment]
