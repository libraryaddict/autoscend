auto_disableAdventureHandling:
  type: boolean
  description: When true this prevents preadventure and postadventure scripts from running. resets every loop.
auto_disableFamiliarChanging:
  type: boolean
  description: When true this prevents familiar changes. resets every loop.
auto_combatDirective:
  type: string
  description: An action to execute at the start of next combat. resets every loop.
auto_interruptZones:
  type: string
  description: Semicolon-separated list of zones to abort in before starting the first adventure.
